<section class="contact section" id="contact">
  <div class="container">
    <div class="contact__grid">
      <!-- Left: Info -->
      <div class="contact__info fade-in-up">
        <h2 class="contact__title" data-i18n="contact.title">Get in Touch</h2>
        <div class="section__divider" style="margin-left: 0"></div>
        <p class="contact__text" data-i18n="contact.text">
          Have a question about our dolls? Want a custom Motanka made just for
          you? We'd love to hear from you.
        </p>
        <!-- Quick email form -->
        <form class="contact__quick-form" id="quickContactForm">
          <div class="contact__quick-form-group">
            <input
              type="email"
              id="quickEmail"
              name="email"
              class="contact__quick-input"
              placeholder="Enter your email address"
              data-i18n-placeholder="contact.emailPlaceholder"
              required
            />
            <button type="submit" class="btn btn--primary contact__quick-btn">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              Contact Us
            </button>
          </div>
          <span class="contact__quick-error" id="quickEmailError"></span>
          <p
            class="contact__quick-success"
            id="quickFormSuccess"
            data-i18n="contact.quickSuccess"
          >
            Thanks! We'll get back to you shortly.
          </p>
        </form>
        <div class="contact__details">
          <div class="contact__detail">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <span>hello@motankadolls.com</span>
          </div>
          <div class="contact__detail">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            <span data-i18n="contact.location">Rivne, Ukraine</span>
          </div>
        </div>

        <!-- Social Icons -->
        <div class="contact__social">
          <h4 class="contact__social-heading" data-i18n="contact.followUs">
            Follow Us
          </h4>
          <div class="contact__social-links">
            <a
              href="https://www.facebook.com/profile.php?id=100057108864161"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Facebook"
              class="contact__social-link contact__social-link--facebook"
            >
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073c0 6.025 4.388 11.02 10.125 11.927v-8.437H7.078v-3.49h3.047V9.41c0-3.026 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.971H15.83c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796v8.437C19.612 23.093 24 18.098 24 12.073z"
                />
              </svg>
            </a>
            <a
              href="https://www.instagram.com/sviit5lana?igsh=MWMwcGdvcnk3OGpnZg=="
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Instagram"
              class="contact__social-link contact__social-link--instagram"
            >
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M12 2.163c3.204 0 3.584.012 4.85.07 1.17.054 1.97.24 2.43.403a4.088 4.088 0 011.47.958c.453.453.78.898.958 1.47.163.46.349 1.26.404 2.43.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.055 1.17-.241 1.97-.404 2.43a4.088 4.088 0 01-.958 1.47 4.088 4.088 0 01-1.47.958c-.46.163-1.26.349-2.43.404-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.17-.055-1.97-.241-2.43-.404a4.088 4.088 0 01-1.47-.958 4.088 4.088 0 01-.958-1.47c-.163-.46-.349-1.26-.404-2.43C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.055-1.17.241-1.97.404-2.43a4.088 4.088 0 01.958-1.47 4.088 4.088 0 011.47-.958c.46-.163 1.26-.349 2.43-.404C8.416 2.175 8.796 2.163 12 2.163zM12 0C8.741 0 8.333.014 7.053.072 5.775.13 4.902.333 4.14.63a5.882 5.882 0 00-2.126 1.384A5.882 5.882 0 00.63 4.14C.333 4.902.13 5.775.072 7.053.014 8.333 0 8.741 0 12s.014 3.667.072 4.947c.058 1.278.261 2.151.558 2.913a5.882 5.882 0 001.384 2.126 5.882 5.882 0 002.126 1.384c.762.297 1.635.5 2.913.558C8.333 23.986 8.741 24 12 24s3.667-.014 4.947-.072c1.278-.058 2.151-.261 2.913-.558a5.882 5.882 0 002.126-1.384 5.882 5.882 0 001.384-2.126c.297-.762.5-1.635.558-2.913.058-1.28.072-1.688.072-4.947s-.014-3.667-.072-4.947c-.058-1.278-.261-2.151-.558-2.913a5.882 5.882 0 00-1.384-2.126A5.882 5.882 0 0019.86.63C19.098.333 18.225.13 16.947.072 15.667.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"
                />
              </svg>
            </a>
          </div>
        </div>
      </div>

      <!-- Right: Form -->
      <form
        class="contact__form fade-in-up"
        id="contactForm"
        action="https://formspree.io/f/your-endpoint"
        method="POST"
      >
        <div class="form-group">
          <label
            for="contactName"
            class="form-label"
            data-i18n="contact.nameLabel"
            >Name</label
          >
          <input
            type="text"
            id="contactName"
            name="name"
            class="form-input"
            placeholder="Your name"
            data-i18n-placeholder="contact.namePlaceholder"
            required
          />
          <span class="form-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label
            for="contactEmail"
            class="form-label"
            data-i18n="contact.emailLabel"
            >Email</label
          >
          <input
            type="email"
            id="contactEmail"
            name="email"
            class="form-input"
            placeholder="your@email.com"
            required
          />
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label
            for="contactMessage"
            class="form-label"
            data-i18n="contact.messageLabel"
            >Message</label
          >
          <textarea
            id="contactMessage"
            name="message"
            class="form-input form-textarea"
            placeholder="Tell us what you're looking for..."
            data-i18n-placeholder="contact.messagePlaceholder"
            rows="5"
            required
          ></textarea>
          <span class="form-error" id="messageError"></span>
        </div>

        <button
          type="submit"
          class="btn btn--primary contact__submit"
          data-i18n="contact.submit"
        >
          Send Message
        </button>
        <p
          class="contact__success"
          id="formSuccess"
          data-i18n="contact.success"
        >
          Thank you! Your message has been sent.
        </p>
      </form>
    </div>
  </div>
</section>
