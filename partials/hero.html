<section class="hero" id="hero">
  <!-- Background Video -->
  <div class="hero__media">
    <video
      class="hero__video"
      autoplay
      muted
      loop
      playsinline
      poster="img/IMG_7824.PNG"
    >
      <source src="video/fly_motanka.MP4" type="video/mp4" />
    </video>
    <div class="hero__overlay"></div>
  </div>

  <!-- Hero Content -->
  <div class="container hero__content">
    <span class="hero__tag fade-in-up" data-i18n="hero.tag"
      >✦ Handcrafted with Soul</span
    >
    <h1 class="hero__title fade-in-up" data-i18n="hero.title">Motanka Dolls</h1>
    <p class="hero__subtitle fade-in-up" data-i18n="hero.subtitle">
      Ancient Ukrainian tradition woven with love, faith, and protection — each
      doll carries a story passed through generations.
    </p>
    <a
      href="#products"
      class="btn btn--white hero__cta fade-in-up"
      data-i18n="hero.cta"
      >Explore Collection</a
    >
  </div>

  <!-- Social Sidebar -->
  <div class="hero__social">
    <a
      href="https://www.instagram.com/sviit5lana?igsh=MWMwcGdvcnk3OGpnZg=="
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Instagram"
      class="hero__social-link"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
      >
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
        <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z" />
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
      </svg>
    </a>
    <a
      href="https://www.facebook.com/profile.php?id=100057108864161"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Facebook"
      class="hero__social-link"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
      >
        <path
          d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"
        />
      </svg>
    </a>
    <span class="hero__social-line"></span>
  </div>

  <!-- Scroll Indicator -->
  <div class="hero__scroll">
    <span data-i18n="hero.scroll">Scroll</span>
    <div class="hero__scroll-line"></div>
  </div>
</section>
